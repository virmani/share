  // 14 — Closer page 3: T1D
  { type: 'closer-t1d' },
  // 15 — Closer page 4: payoff
  { type: 'closer-payoff' }
];

const STATE = { slide: 0, stage: 0, zoom: 1 };

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

function setCatVars(root, cat) {
  root.style.setProperty('--cat', `var(--c-${cat})`);
  root.style.setProperty('--cat-soft', `var(--c-${cat}-soft)`);
  root.style.setProperty('--cat-ink', `var(--c-${cat}-ink)`);
}

function familyRow() {
  const row = el('div', 'family-row');

    <div class="person"><div class="avatar manasi">M</div><div class="person-name-large">Manasi</div></div>
  `;
  return row;
}

function cardsRow(states) {
  const labels = ['Ashish', 'Nishka', 'Manasi'];
  const row = el('div', 'cards-row');
  states.forEach((c, i) => {
    const pc = el('div', 'person-card');
    pc.innerHTML = `<div class="card ${c}">${c === 'green' ? 'YES' : 'NO'}</div><div class="person-name">${labels[i]}</div>`;
    row.appendChild(pc);
  });
  return row;
}

function photoFrame(slide) {
  const sources = slide.photoSrcs || (slide.photoSrc ? [slide.photoSrc] : []);
  const wrap = el('div', 'photo-frame');
  if (sources.length > 0) {
    wrap.classList.add('has-image');
    if (sources.length > 1) wrap.classList.add('photo-frame--multi');
    sources.forEach((src) => {
      const img = el('img');
      img.src = src;
      img.alt = slide.photoLabel || '';
      wrap.appendChild(img);
    });
  } else {
    wrap.innerHTML = `<div class="photo-emoji">${slide.photoEmoji}</div><div>${slide.photoLabel}</div>`;
  }
  return wrap;
}

function renderTrivia(slide, stage) {
  const root = el('div', 'slide');
  setCatVars(root, slide.cat);
  root.appendChild(el('div', 'category-label', slide.catLabel));
  root.appendChild(el('h1', 'question', slide.question));

  if (stage === 0) {
    if (slide.photoOnQuestion || slide.photoOnBoth) root.appendChild(photoFrame(slide));
    else {
      const ill = el('div', 'illustration');
      ill.textContent = slide.illustration;
      root.appendChild(ill);
    }
  } else {
    // stage 1 (reveal)
    if (slide.photoOnReveal || slide.photoOnBoth) {
      root.appendChild(photoFrame(slide));
      root.appendChild(el('div', 'hero-label', slide.answerLabel));
    } else {
      const hero = el('div', 'hero-answer');
      hero.innerHTML = `<div class="hero-number">${slide.answer}</div><div class="hero-label">${slide.answerLabel}</div>`;
      root.appendChild(hero);
    }
    root.appendChild(cardsRow(slide.cards));
    const det = el('div', 'detail');
    det.innerHTML = slide.detail;
    root.appendChild(det);

  return root;
}

// ===== Routing =====
function getTotalStages(idx) {
  const s = SLIDES[idx];
  return s.type === 'trivia' ? 2 : 1;
}

function render() {
  const slide = SLIDES[STATE.slide];
  const area = document.getElementById('slide-area');
  area.innerHTML = '';
  let elNode;
  switch (slide.type) {
    case 'intro1': elNode = renderIntro1(); break;
    case 'intro2': elNode = renderIntro2(); break;
    case 'intro3': elNode = renderIntro3(); break;
    case 'closer-iceberg': elNode = renderCloserIceberg(); break;
    case 'closer-adhd': elNode = renderCloserAdhd(); break;
    case 'closer-t1d': elNode = renderCloserT1d(); break;
    case 'closer-payoff': elNode = renderCloserPayoff(); break;
    default: elNode = renderTrivia(slide, STATE.stage);
  }
  area.appendChild(elNode);

  document.getElementById('slide-current').textContent = STATE.slide + 1;
  document.getElementById('slide-total').textContent = SLIDES.length;
  const totalStages = getTotalStages(STATE.slide);
  const stageInfo = document.getElementById('stage-info');
  stageInfo.textContent = totalStages > 1 ? ` · stage ${STATE.stage + 1}/${totalStages}` : '';

  document.getElementById('progress-bar').style.width = (((STATE.slide + 1) / SLIDES.length) * 100) + '%';
  document.getElementById('prev').disabled = (STATE.slide === 0 && STATE.stage === 0);
  document.getElementById('next').disabled = (STATE.slide === SLIDES.length - 1 && STATE.stage === totalStages - 1);
}

function next() {
  const total = getTotalStages(STATE.slide);
  if (STATE.stage < total - 1) STATE.stage++;
  else if (STATE.slide < SLIDES.length - 1) { STATE.slide++; STATE.stage = 0; updateHash(); }
  else return;
  render();
}
function prev() {
  if (STATE.stage > 0) STATE.stage--;
  else if (STATE.slide > 0) { STATE.slide--; STATE.stage = getTotalStages(STATE.slide) - 1; updateHash(); }
  else return;
  render();
}
function updateHash() { history.replaceState(null, '', '#' + (STATE.slide + 1)); }
function readHash() {
  const m = window.location.hash.match(/^#(\d+)$/);
  if (m) {
    const n = parseInt(m[1], 10);
    if (n >= 1 && n <= SLIDES.length) { STATE.slide = n - 1; STATE.stage = 0; }
  }
}

// Zoom
function applyZoom() { document.documentElement.style.setProperty('--zoom', STATE.zoom); localStorage.setItem('iceberg-zoom', STATE.zoom); }
function zoomIn() { STATE.zoom = Math.min(2, STATE.zoom + 0.1); applyZoom(); }
function zoomOut() { STATE.zoom = Math.max(0.6, STATE.zoom - 0.1); applyZoom(); }
function loadZoom() { const z = parseFloat(localStorage.getItem('iceberg-zoom')); if (!isNaN(z) && z >= 0.6 && z <= 2) { STATE.zoom = z; applyZoom(); } }

// Theme
function applyTheme(theme) { document.documentElement.style.colorScheme = theme; document.getElementById('theme-toggle').textContent = (theme === 'dark') ? '🌙' : '☀'; localStorage.setItem('iceberg-theme', theme); }
function toggleTheme() { const c = localStorage.getItem('iceberg-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); applyTheme(c === 'dark' ? 'light' : 'dark'); }
function loadTheme() { const s = localStorage.getItem('iceberg-theme'); if (s) applyTheme(s); else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); }

// Init
loadZoom(); loadTheme(); readHash(); render();
document.getElementById('next').addEventListener('click', next);
document.getElementById('prev').addEventListener('click', prev);
document.getElementById('zoom-in').addEventListener('click', zoomIn);
document.getElementById('zoom-out').addEventListener('click', zoomOut);
document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
});
document.getElementById('slide-area').addEventListener('click', () => next());
window.addEventListener('hashchange', () => { readHash(); render(); });
</script>
